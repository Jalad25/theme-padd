name: Update scorecard badge

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout badges branch
        uses: actions/checkout@v4
        with:
          ref: badges
          fetch-depth: 1

      - name: Fetch and parse scorecard
        env:
          PLUGIN_ID: theme-padd
        run: |
          python3 <<'PY'
          import json, os, re, urllib.request

          pid = os.environ["PLUGIN_ID"]
          url = f"https://community.obsidian.md/plugins/{pid}"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          html = urllib.request.urlopen(req).read().decode("utf-8", "ignore")

          health = re.search(r'Health</span><span[^>]*>([^<]+)</span>', html)
          review = re.search(r'Review</span><span[^>]*>([^<]+)</span>', html)
          pct    = re.search(r'tabular-nums"[^>]*>(\d{1,3})(?:<!--[^>]*-->)?%', html)

          health_v = health.group(1).strip() if health else "unknown"
          review_v = review.group(1).strip() if review else "unknown"
          pct_v    = pct.group(1) if pct else "?"

          color = {
              "Excellent": "brightgreen",
              "Good":      "green",
              "Fair":      "yellow",
              "Poor":      "orange",
              "Bad":       "red",
          }.get(health_v, "lightgrey")

          badge = {
              "schemaVersion": 1,
              "label": "Obsidian Scorecard",
              "message": f"{pct_v}% • {health_v} • {review_v}",
              "color": color,
              "namedLogo": "obsidian",
          }

          with open(f"{pid}.json", "w") as f:
              json.dump(badge, f, indent=2)
              f.write("\n")
          print(badge)
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update scorecard badge"
          git push
