name: Bug report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so the issue can be reproduced and triaged quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched [existing issues](../issues?q=is%3Aissue) and this has not already been reported.
          required: true
        - label: I am using the latest version of the plugin.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, step-by-step path to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or console output.
    validations:
      required: true

  - type: input
    id: theme-name
    attributes:
      label: Affected theme (if any)
      description: If the bug involves a specific theme, paste its name here.
      placeholder: e.g. Things, Minimal, etc.
    validations:
      required: false

  - type: textarea
    id: error-details
    attributes:
      label: Copied error details (if any)
      description: If the settings tab is showing an error block, click the **Copy** button on it and paste the result here.
      render: text
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.0.3
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: e.g. 1.7.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: dropdown
    id: theme-mode
    attributes:
      label: Theme mode
      description: Which Obsidian appearance mode does the bug occur in? If you haven't checked the other mode, please try to reproduce there as well, some issues are theme-specific.
      options:
        - Both light and dark mode
        - Light mode only
        - Dark mode only
        - Not applicable / not visual
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where does the bug occur?
      description: Which part of the plugin is affected? Pick all that apply.
      multiple: true
      options:
        - Settings tab (Theme PADD settings rendering)
        - Settings tab (theme errors / unsupported themes block)
        - Theme settings being applied to the DOM (live preview)
        - Loading or fetching a theme's settings.json
        - Persistence of user values across reloads or theme updates
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: other-plugins
    attributes:
      label: Other plugins enabled
      description: Does the bug still occur with all other community plugins disabled? List any plugins that seem related.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: If applicable, add screenshots or a short recording to help explain the problem.
    validations:
      required: false
